name: Build qwentts.cpp Native Libraries (SeasonRealms fork)

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Platform(s) to build"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - windows
          - linux
          - macos
          - maccatalyst
          - ios
          - android
      qwentts_ref:
        description: "qwentts.cpp tag / branch / commit (SeasonRealms fork)"
        required: true
        default: "master"
      ggml_ref:
        description: "ggml fork tag / branch / commit"
        required: false
        default: "master"
      cuda_version:
        description: "CUDA Toolkit version (Windows/Linux, aligned with OnnxRuntimeMultiEP default)"
        required: false
        default: "12.8.1"
      cuda_architectures:
        description: "CUDA architectures for Windows/Linux CMake builds"
        required: false
        default: "75-virtual;80-real;86-real;89-real;90-virtual"
      cuda_build_parallel:
        description: "Parallel build jobs for CUDA builds"
        required: false
        default: "4"

permissions:
  contents: read

env:
  QWENTTS_REPO: SeasonRealms/qwentts.cpp
  GGML_REPO: ServeurpersoCom/ggml

jobs:
  # ══════════════════════════════════════════════════════════════════
  #  Windows x64 — CPU + CUDA + Vulkan (DL mode)
  # ══════════════════════════════════════════════════════════════════
  build-windows:
    if: inputs.build_target == 'windows' || inputs.build_target == 'all'
    runs-on: windows-2022
    timeout-minutes: 240
    steps:
      - name: Clone qwentts.cpp
        run: git clone --depth 1 --branch "${{ github.event.inputs.qwentts_ref }}" "https://github.com/${{ env.QWENTTS_REPO }}.git" qwentts

      - name: Clone ggml fork
        run: git clone --depth 1 --branch "${{ github.event.inputs.ggml_ref }}" "https://github.com/${{ env.GGML_REPO }}.git" qwentts/ggml

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "${{ github.event.inputs.cuda_version }}"

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        shell: pwsh
        working-directory: qwentts
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake .. `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DQWEN_SHARED=ON `
            -DGGML_CPU_ALL_VARIANTS=ON `
            -DGGML_CUDA=ON `
            -DGGML_VULKAN=ON `
            -DGGML_BACKEND_DL=ON `
            -DCMAKE_CUDA_ARCHITECTURES="${{ github.event.inputs.cuda_architectures }}"

      - name: Build
        working-directory: qwentts/build
        run: cmake --build . --parallel ${{ github.event.inputs.cuda_build_parallel }}

      - name: Collect artifacts
        shell: pwsh
        run: |
          $out = "out/runtimes/win-x64/native"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          Copy-Item qwentts/build/qwen.dll        -Destination $out -ErrorAction SilentlyContinue
          Copy-Item qwentts/build/qwen.lib        -Destination $out -ErrorAction SilentlyContinue
          # qwen.dll directly depends on ggml.dll and ggml-base.dll in addition to
          # the backend-specific ggml-*.dll files, so collect every Windows ggml DLL.
          Get-ChildItem qwentts/build -Filter "ggml*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination $out
          }

          # Public header for binding consumers
          Copy-Item qwentts/src/qwen.h -Destination $out

          # Bundle CUDA runtime DLLs so end users do NOT need to install the
          # CUDA Toolkit.  GGML's CUDA backend links against cudart + cublas;
          # the other libraries are dependencies of those or may be needed by
          # future GGML operations (cufft, curand, cusparse, nvJitLink).
          # cuDNN is NOT included — qwentts.cpp is transformer-based (attention
          # + MLP), not convolution-based, so cuDNN would never be loaded.
          if (-not $env:CUDA_PATH) {
            throw "CUDA_PATH is not set after installing CUDA Toolkit."
          }

          $cudaBin = Join-Path $env:CUDA_PATH "bin"
          if (-not (Test-Path $cudaBin)) {
            throw "CUDA bin directory not found: $cudaBin"
          }
          $cudaLib = Join-Path $env:CUDA_PATH "lib\x64"
          $cudaSeries = ("${{ github.event.inputs.cuda_version }}" -split '\.')[0..1] -join "."
          $searchRoots = @($cudaBin)
          if (Test-Path $cudaLib) {
            $searchRoots += $cudaLib
          }

          function Copy-MatchingFiles {
            param(
              [string[]]$Roots,
              [string[]]$Patterns,
              [string]$Destination
            )

            $copied = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)

            foreach ($root in $Roots) {
              if (-not (Test-Path $root)) {
                continue
              }

              foreach ($pattern in $Patterns) {
                Get-ChildItem -Path $root -Recurse -File -Filter $pattern -ErrorAction SilentlyContinue | ForEach-Object {
                  $destPath = Join-Path $Destination $_.Name
                  Copy-Item $_.FullName -Destination $destPath -Force
                  $null = $copied.Add($_.Name)
                }
              }
            }

            return @($copied | Sort-Object)
          }

          function Get-LatestNvidiaRedistArchiveUrl {
            param(
              [string]$Component,
              [string]$Series
            )

            $indexUrl = "https://developer.download.nvidia.com/compute/cuda/redist/$Component/windows-x86_64/"
            $response = Invoke-WebRequest -Uri $indexUrl -UseBasicParsing
            $escapedComponent = [regex]::Escape($Component)
            $escapedSeries = [regex]::Escape($Series)
            $regex = [regex]"$escapedComponent-windows-x86_64-($escapedSeries(?:\.\d+)+)-archive\.zip"

            $archives = foreach ($match in $regex.Matches($response.Content)) {
              [pscustomobject]@{
                FileName = $match.Value
                Version  = [version]$match.Groups[1].Value
              }
            }

            $latest = $archives | Sort-Object Version -Descending | Select-Object -First 1
            if ($null -eq $latest) {
              return $null
            }

            return $indexUrl + $latest.FileName
          }

          function Ensure-ComponentDlls {
            param(
              [string]$Name,
              [string[]]$Patterns,
              [string]$RedistComponent,
              [bool]$Required
            )

            $copied = Copy-MatchingFiles -Roots $searchRoots -Patterns $Patterns -Destination $out
            if ($copied.Count -gt 0) {
              Write-Host "$Name DLLs copied from installed toolkit: $($copied -join ', ')"
              return
            }

            Write-Warning "No local DLLs found for $Name under: $($searchRoots -join '; ')"

            if ([string]::IsNullOrWhiteSpace($RedistComponent)) {
              if ($Required) {
                throw "Missing required CUDA DLLs for component '$Name'."
              }
              return
            }

            $archiveUrl = Get-LatestNvidiaRedistArchiveUrl -Component $RedistComponent -Series $cudaSeries
            if ([string]::IsNullOrWhiteSpace($archiveUrl)) {
              if ($Required) {
                throw "No NVIDIA redist archive found for component '$RedistComponent' in CUDA series $cudaSeries."
              }
              Write-Warning "No NVIDIA redist archive found for optional component '$RedistComponent' in CUDA series $cudaSeries."
              return
            }

            $downloadRoot = Join-Path $env:RUNNER_TEMP "cuda-redist"
            $extractRoot = Join-Path $downloadRoot "extract-$Name"
            New-Item -ItemType Directory -Force -Path $downloadRoot | Out-Null
            if (Test-Path $extractRoot) {
              Remove-Item -Path $extractRoot -Recurse -Force
            }

            $archiveName = Split-Path $archiveUrl -Leaf
            $archivePath = Join-Path $downloadRoot $archiveName
            Write-Host "Downloading fallback redist for ${Name}: $archiveUrl"
            Invoke-WebRequest -Uri $archiveUrl -OutFile $archivePath -UseBasicParsing
            Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

            $copied = Copy-MatchingFiles -Roots @($extractRoot) -Patterns $Patterns -Destination $out
            if ($copied.Count -gt 0) {
              Write-Host "$Name DLLs copied from NVIDIA redist: $($copied -join ', ')"
              return
            }

            if ($Required) {
              throw "Missing required CUDA DLLs for component '$Name' even after downloading NVIDIA redist archive '$archiveName'."
            }

            Write-Warning "Optional component '$Name' was not found even after downloading NVIDIA redist archive '$archiveName'."
          }

          Ensure-ComponentDlls -Name "cudart" -Patterns @("cudart64_*.dll", "cudart*.dll") -RedistComponent "cuda_cudart" -Required $true
          Ensure-ComponentDlls -Name "cublas" -Patterns @("cublas64_*.dll", "cublas*.dll", "cublasLt64_*.dll", "cublasLt*.dll") -RedistComponent "libcublas" -Required $true
          Ensure-ComponentDlls -Name "cufft" -Patterns @("cufft64_*.dll", "cufft*.dll") -RedistComponent "libcufft" -Required $false
          Ensure-ComponentDlls -Name "curand" -Patterns @("curand64_*.dll", "curand*.dll") -RedistComponent "libcurand" -Required $false
          Ensure-ComponentDlls -Name "cusparse" -Patterns @("cusparse64_*.dll", "cusparse*.dll") -RedistComponent "libcusparse" -Required $false
          Ensure-ComponentDlls -Name "nvJitLink" -Patterns @("nvJitLink_*.dll", "nvJitLink*.dll") -RedistComponent "libnvjitlink" -Required $false

          $manifest = Join-Path $out "README.txt"
          @(
            "QWENTTS_REF: ${{ github.event.inputs.qwentts_ref }}",
            "GGML_REF: ${{ github.event.inputs.ggml_ref }}",
            "CUDA Toolkit version: ${{ github.event.inputs.cuda_version }}",
            "CUDA_PATH: $env:CUDA_PATH",
            "",
            "Windows qwentts artifact contents:"
          ) | Set-Content -Path $manifest -Encoding ascii

          Write-Host "Windows artifacts:"
          Get-ChildItem $out -File | Sort-Object Name | ForEach-Object {
            Add-Content -Path $manifest -Value $_.Name -Encoding ascii
            Write-Host "  $($_.Name)"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwentts-win-x64
          path: out/runtimes/win-x64/native/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════
  #  Linux x64 — CPU + CUDA + Vulkan (DL mode)
  # ══════════════════════════════════════════════════════════════════
  build-linux:
    if: inputs.build_target == 'linux' || inputs.build_target == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Clone qwentts.cpp
        run: git clone --depth 1 --branch "${{ github.event.inputs.qwentts_ref }}" "https://github.com/${{ env.QWENTTS_REPO }}.git" qwentts

      - name: Clone ggml fork
        run: git clone --depth 1 --branch "${{ github.event.inputs.ggml_ref }}" "https://github.com/${{ env.GGML_REPO }}.git" qwentts/ggml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libvulkan-dev glslc glslang-tools vulkan-tools spirv-headers

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "${{ github.event.inputs.cuda_version }}"
          method: "network"
          # cudart/nvrtc/nvcc follow the cuda-{name}-{ver} convention and work.
          # Install the matching 12.8 cublas/nvrtc development packages below.
          sub-packages: '["cudart", "nvrtc", "nvcc"]'

      - name: Install CUDA 12.8 extra packages
        run: |
          sudo apt-get install -y \
            libcublas-12-8 \
            libcublas-dev-12-8 \
            cuda-nvrtc-dev-12-8

      - name: Configure CMake
        working-directory: qwentts
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DQWEN_SHARED=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_CUDA=ON \
            -DGGML_VULKAN=ON \
            -DGGML_BACKEND_DL=ON \
            -DCMAKE_CUDA_ARCHITECTURES="${{ github.event.inputs.cuda_architectures }}" \
            -G Ninja

      - name: Build
        working-directory: qwentts/build
        run: ninja -j ${{ github.event.inputs.cuda_build_parallel }}

      - name: Collect artifacts
        run: |
          out="out/runtimes/linux-x64/native"
          mkdir -p "$out"
          cp qwentts/build/libqwen.so     "$out/" 2>/dev/null || true
          cp qwentts/build/libggml-*.so   "$out/" 2>/dev/null || true
          cp qwentts/src/qwen.h           "$out/"
          echo "Linux artifacts:"
          ls -la "$out/"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwentts-linux-x64
          path: out/runtimes/linux-x64/native/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════
  #  macOS ARM64 — Metal backend (shared for desktop + MacCatalyst)
  # ══════════════════════════════════════════════════════════════════
  build-macos:
    if: inputs.build_target == 'macos' || inputs.build_target == 'maccatalyst' || inputs.build_target == 'all'
    runs-on: macos-latest
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            deployment_target: "13.0"
            platform: macos
          - rid: maccatalyst-arm64
            deployment_target: "15.0"
            platform: maccatalyst
    steps:
      - name: Clone qwentts.cpp
        run: git clone --depth 1 --branch "${{ github.event.inputs.qwentts_ref }}" "https://github.com/${{ env.QWENTTS_REPO }}.git" qwentts

      - name: Clone ggml fork
        run: git clone --depth 1 --branch "${{ github.event.inputs.ggml_ref }}" "https://github.com/${{ env.GGML_REPO }}.git" qwentts/ggml

      - name: Configure CMake
        if: inputs.build_target == matrix.platform || inputs.build_target == 'all'
        working-directory: qwentts
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DQWEN_SHARED=ON \
            -DGGML_METAL=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deployment_target }} \
            -G Ninja

      - name: Build
        if: inputs.build_target == matrix.platform || inputs.build_target == 'all'
        working-directory: qwentts/build
        run: ninja -j $(sysctl -n hw.logicalcpu)

      - name: Collect artifacts
        if: inputs.build_target == matrix.platform || inputs.build_target == 'all'
        run: |
          out="out/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$out"
          cp qwentts/build/libqwen.dylib     "$out/" 2>/dev/null || true
          cp qwentts/build/libggml-metal.dylib "$out/" 2>/dev/null || true
          cp qwentts/build/libggml-cpu.dylib  "$out/" 2>/dev/null || true
          cp qwentts/src/qwen.h              "$out/"
          echo "${{ matrix.rid }} artifacts:"
          ls -la "$out/"

      - name: Upload macOS artifacts
        if: inputs.build_target == matrix.platform || inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: qwentts-${{ matrix.rid }}
          path: out/runtimes/${{ matrix.rid }}/native/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════
  #  iOS ARM64 — Metal backend, static library
  # ══════════════════════════════════════════════════════════════════
  build-ios:
    if: inputs.build_target == 'ios' || inputs.build_target == 'all'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Clone qwentts.cpp
        run: git clone --depth 1 --branch "${{ github.event.inputs.qwentts_ref }}" "https://github.com/${{ env.QWENTTS_REPO }}.git" qwentts

      - name: Clone ggml fork
        run: git clone --depth 1 --branch "${{ github.event.inputs.ggml_ref }}" "https://github.com/${{ env.GGML_REPO }}.git" qwentts/ggml

      - name: Configure CMake (iOS static)
        working-directory: qwentts
        run: |
          mkdir build-ios && cd build-ios
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DQWEN_SHARED=OFF \
            -DGGML_METAL=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -G Xcode

      - name: Build
        working-directory: qwentts/build-ios
        run: |
          cmake --build . --config Release -- -sdk iphoneos -arch arm64

      - name: Collect artifacts
        run: |
          out="out/runtimes/ios-arm64/native"
          mkdir -p "$out"

          # Static libraries — Xcode places them under Release-iphoneos/
          cp qwentts/build-ios/Release-iphoneos/libqwen-core.a  "$out/" 2>/dev/null || true
          cp qwentts/build-ios/Release-iphoneos/libggml.a       "$out/" 2>/dev/null || true
          cp qwentts/build-ios/Release-iphoneos/libggml-metal.a "$out/" 2>/dev/null || true

          # Fallback: try flat build dir (Ninja generator would put them here)
          cp qwentts/build-ios/libqwen-core.a  "$out/" 2>/dev/null || true
          cp qwentts/build-ios/libggml.a       "$out/" 2>/dev/null || true
          cp qwentts/build-ios/libggml-metal.a "$out/" 2>/dev/null || true

          cp qwentts/src/qwen.h "$out/"
          echo "iOS artifacts:"
          ls -la "$out/"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwentts-ios-arm64
          path: out/runtimes/ios-arm64/native/
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════════
  #  Android ARM64 — CPU + Vulkan (DL mode)
  # ══════════════════════════════════════════════════════════════════
  build-android:
    if: inputs.build_target == 'android' || inputs.build_target == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        abi: [arm64-v8a]
    steps:
      - name: Clone qwentts.cpp
        run: git clone --depth 1 --branch "${{ github.event.inputs.qwentts_ref }}" "https://github.com/${{ env.QWENTTS_REPO }}.git" qwentts

      - name: Clone ggml fork
        run: git clone --depth 1 --branch "${{ github.event.inputs.ggml_ref }}" "https://github.com/${{ env.GGML_REPO }}.git" qwentts/ggml

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Configure CMake
        working-directory: qwentts
        run: |
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_ANDROID_ARCH_ABI=${{ matrix.abi }} \
            -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
            -DCMAKE_ANDROID_API=26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DQWEN_SHARED=ON \
            -DGGML_VULKAN=ON \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_BACKEND_DL=ON \
            -G Ninja

      - name: Build
        working-directory: qwentts/build-android
        run: ninja -j $(nproc)

      - name: Collect artifacts
        run: |
          out="out/runtimes/android-${{ matrix.abi }}/native"
          mkdir -p "$out"
          cp qwentts/build-android/libqwen.so        "$out/" 2>/dev/null || true
          cp qwentts/build-android/libggml-cpu.so    "$out/" 2>/dev/null || true
          cp qwentts/build-android/libggml-vulkan.so "$out/" 2>/dev/null || true
          cp qwentts/src/qwen.h                      "$out/"
          echo "Android (${{ matrix.abi }}) artifacts:"
          ls -la "$out/"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwentts-android-${{ matrix.abi }}
          path: out/runtimes/android-${{ matrix.abi }}/native/
          if-no-files-found: error
